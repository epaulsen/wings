<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="seaSkyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7ba7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="960" height="540" fill="url(#seaSkyGrad)"/>
  
  <!-- Sea takes up most of view -->
  <rect y="280" width="960" height="260" fill="#0d3b6e"/>
  <line x1="0" y1="290" x2="960" y2="290" stroke="#1a5f9e" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="340" x2="960" y2="340" stroke="#1a5f9e" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Aircraft Carrier (grey hull and deck) -->
  <g transform="translate(200, 340)">
    <!-- Hull -->
    <rect x="0" y="0" width="400" height="55" fill="#3f4954"/>
    <polygon points="0,0 20,0 10,30 0,30" fill="#2a3540"/>
    <polygon points="400,0 380,0 390,30 400,30" fill="#2a3540"/>
    
    <!-- Deck -->
    <rect x="0" y="0" width="400" height="30" fill="#68717b"/>
    
    <!-- Deck markings (flight pattern) -->
    <line x1="20" y1="0" x2="20" y2="30" stroke="#4a5563" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="30" stroke="#4a5563" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="30" stroke="#4a5563" stroke-width="1"/>
    <line x1="0" y1="15" x2="400" y2="15" stroke="#4a5563" stroke-width="1"/>
    
    <!-- Superstructure (tower) -->
    <rect x="320" y="-60" width="50" height="60" fill="#556677"/>
    <rect x="330" y="-50" width="15" height="20" fill="#7ec8e3" opacity="0.6"/>
    <rect x="350" y="-50" width="15" height="20" fill="#7ec8e3" opacity="0.6"/>
    <polygon points="295,-70 375,-70 370,-60 300,-60" fill="#556677"/>
  </g>
  
  <!-- Player plane approaching from right, low altitude -->
  <g transform="translate(700, 320)">
    <!-- Fuselage -->
    <rect x="0" y="8" width="50" height="10" fill="#3d4c2e"/>
    <!-- Wings -->
    <polygon points="-15,12 50,12 50,15 -15,15" fill="#3d4c2e"/>
    <!-- Tail -->
    <polygon points="45,10 60,8 60,18" fill="#3d4c2e"/>
    <!-- Cockpit light -->
    <circle cx="10" cy="12" r="3" fill="#7ec8e3"/>
  </g>
  
  <!-- Landing approach vector indicators -->
  <g transform="translate(650, 330)" opacity="0.7">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#00ff00" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="0" x2="25" y2="10" stroke="#00ff00" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="0" x2="25" y2="-10" stroke="#00ff00" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- HUD Display -->
  <rect x="10" y="10" width="950" height="50" fill="rgba(0, 0, 0, 0.5)" stroke="#f8f8f8" stroke-width="1"/>
  
  <!-- Fuel gauge (LOW - RED) -->
  <text x="20" y="35" font-family="monospace" font-size="14" fill="#ff6644">FUEL</text>
  <rect x="80" y="20" width="100" height="16" fill="#2a3a2a" stroke="#f8f8f8" stroke-width="1"/>
  <rect x="80" y="20" width="20" height="16" fill="#ff3333"/>
  <text x="190" y="35" font-family="monospace" font-size="12" fill="#ff6644">⚠ CRITICAL</text>
  
  <!-- Speed indicator -->
  <text x="380" y="35" font-family="monospace" font-size="14" fill="#00ff00">SPEED</text>
  <text x="480" y="35" font-family="monospace" font-size="14" fill="#00ff00">95 px/s</text>
  
  <!-- Altitude -->
  <text x="680" y="35" font-family="monospace" font-size="14" fill="#00ff00">ALT</text>
  <text x="740" y="35" font-family="monospace" font-size="14" fill="#00ff00">12m</text>
  
  <!-- Landing state indicator -->
  <text x="480" y="60" font-family="monospace" font-size="13" fill="#ffff00" text-anchor="middle" font-weight="bold">LANDING APPROACH — ALIGN WITH DECK</text>
  
  <!-- Wind indicator (subtle) -->
  <g transform="translate(850, 25)" opacity="0.7">
    <text font-family="monospace" font-size="10" fill="#8899aa">WIND</text>
    <polygon points="0,15 5,20 10,15" fill="#8899aa"/>
  </g>
  
  <!-- Distance marker to carrier -->
  <text x="480" y="120" font-family="monospace" font-size="16" fill="#ffff99" text-anchor="middle" font-weight="bold">500m to carrier deck</text>
  
  <!-- Crosshair for landing alignment -->
  <g transform="translate(350, 340)" opacity="0.5">
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#ffff00" stroke-width="1"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#ffff00" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#ffff00" stroke-width="1"/>
  </g>
  
  <!-- Subtle wave texture on sea -->
  <circle cx="150" cy="380" r="3" fill="rgba(26,95,158,0.3)"/>
  <circle cx="250" cy="420" r="2.5" fill="rgba(26,95,158,0.3)"/>
  <circle cx="500" cy="400" r="3" fill="rgba(26,95,158,0.3)"/>
  <circle cx="700" cy="440" r="2.5" fill="rgba(26,95,158,0.3)"/>
  <circle cx="850" cy="390" r="3" fill="rgba(26,95,158,0.3)"/>
</svg>
