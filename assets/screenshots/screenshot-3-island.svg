<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="islandSkyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5f8e;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#7aafde;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky gradient (lower altitude) -->
  <rect width="960" height="540" fill="url(#islandSkyGrad)"/>
  
  <!-- Sea at bottom (higher portion) -->
  <rect y="280" width="960" height="260" fill="#0d3b6e"/>
  <line x1="0" y1="290" x2="960" y2="290" stroke="#1a5f9e" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Island fills lower half - green terrain with bumpy ridge -->
  <polygon points="0,280 80,240 180,260 300,230 450,280 650,240 800,260 960,250 960,540 0,540" fill="#5a7247" opacity="0.95"/>
  
  <!-- Island ridge (tree-like bumps) -->
  <circle cx="100" cy="255" r="8" fill="#4a5a3a"/>
  <circle cx="130" cy="250" r="7" fill="#4a5a3a"/>
  <circle cx="160" cy="258" r="8" fill="#4a5a3a"/>
  <circle cx="210" cy="248" r="7" fill="#4a5a3a"/>
  <circle cx="280" cy="245" r="8" fill="#4a5a3a"/>
  <circle cx="320" cy="255" r="7" fill="#4a5a3a"/>
  <circle cx="420" cy="252" r="8" fill="#4a5a3a"/>
  <circle cx="480" cy="245" r="7" fill="#4a5a3a"/>
  <circle cx="530" cy="258" r="8" fill="#4a5a3a"/>
  <circle cx="600" cy="250" r="7" fill="#4a5a3a"/>
  <circle cx="660" cy="248" r="8" fill="#4a5a3a"/>
  <circle cx="720" cy="255" r="7" fill="#4a5a3a"/>
  <circle cx="800" cy="250" r="8" fill="#4a5a3a"/>
  <circle cx="870" cy="245" r="7" fill="#4a5a3a"/>
  
  <!-- Beach (sandy edge on left) -->
  <polygon points="0,320 120,290 150,540 0,540" fill="#d8c28a" opacity="0.85"/>
  
  <!-- HUD at top -->
  <rect x="10" y="10" width="250" height="30" fill="rgba(0, 0, 0, 0.5)" stroke="#f8f8f8" stroke-width="1"/>
  <text x="20" y="30" font-family="monospace" font-size="12" fill="#ffff00">SCORE: 350</text>
  <text x="140" y="30" font-family="monospace" font-size="12" fill="#f8f8f8">ALT: 85m</text>
  
  <!-- Score indicator -->
  <text x="930" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#ffff00" text-anchor="end">+250</text>
  
  <!-- Player plane (low altitude dive) -->
  <g transform="translate(420, 200)">
    <rect x="0" y="0" width="50" height="10" fill="#3d4c2e" opacity="0.9"/>
    <polygon points="-15,4 50,4 50,8 -15,8" fill="#3d4c2e" opacity="0.9"/>
    <polygon points="45,1 60,0 60,10" fill="#3d4c2e" opacity="0.9"/>
    <circle cx="10" cy="4" r="3" fill="#7ec8e3"/>
  </g>
  
  <!-- Tracers going downward -->
  <line x1="430" y1="210" x2="420" y2="340" stroke="#ffff00" stroke-width="1.5" opacity="0.9"/>
  <line x1="437" y1="210" x2="445" y2="340" stroke="#ffff00" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Ground targets on island -->
  <g transform="translate(250, 310)">
    <!-- Tank -->
    <rect x="0" y="0" width="22" height="12" fill="#556677"/>
    <polygon points="10,-4 14,-4 14,0 10,0" fill="#556677"/>
    <text x="25" y="8" font-family="monospace" font-size="10" fill="#cccccc">-50</text>
  </g>
  
  <g transform="translate(380, 320)">
    <!-- Truck -->
    <rect x="0" y="0" width="28" height="10" fill="#3d4c2e"/>
    <circle cx="8" cy="12" r="2" fill="#333"/>
    <text x="32" y="8" font-family="monospace" font-size="10" fill="#cccccc">-25</text>
  </g>
  
  <g transform="translate(520, 305)">
    <!-- Tank -->
    <rect x="0" y="0" width="22" height="12" fill="#556677"/>
    <polygon points="10,-4 14,-4 14,0 10,0" fill="#556677"/>
    <text x="25" y="8" font-family="monospace" font-size="10" fill="#cccccc">-50</text>
  </g>
  
  <g transform="translate(700, 315)">
    <!-- Troops group -->
    <rect x="0" y="0" width="2" height="5" fill="#888"/>
    <rect x="6" y="1" width="2" height="4" fill="#888"/>
    <rect x="12" y="0" width="2" height="5" fill="#888"/>
    <rect x="18" y="1" width="2" height="4" fill="#888"/>
    <text x="22" y="6" font-family="monospace" font-size="9" fill="#cccccc">-30</text>
  </g>
  
  <!-- Explosions on island surface -->
  <circle cx="320" cy="300" r="30" fill="#ff8800" opacity="0.6"/>
  <circle cx="320" cy="300" r="20" fill="#ffdd00" opacity="0.8"/>
  <circle cx="328" cy="290" r="12" fill="#ffff99" opacity="0.9"/>
  
  <circle cx="550" cy="330" r="25" fill="#ff6600" opacity="0.5"/>
  <circle cx="550" cy="330" r="15" fill="#ffcc00" opacity="0.7"/>
  
  <!-- Smoke trails -->
  <circle cx="285" cy="375" r="18" fill="rgba(100,100,100,0.5)"/>
  <circle cx="295" cy="375" r="20" fill="rgba(120,120,120,0.4)"/>
  <circle cx="545" cy="355" r="15" fill="rgba(100,100,100,0.5)"/>
  <circle cx="555" cy="355" r="18" fill="rgba(120,120,120,0.4)"/>
</svg>
